theme = "default"

[page]
size = "A4"
margins = { top = 16.0, right = 16.0, bottom = 16.0, left = 16.0 }

[defaults]
font_family = "Tahoma"
font_size_pt = 7.5
line_height = 1.3
text_align = "left"

[paragraph]
margin_after_pt = 3.0

[headings.h1]
font_size_pt = 13.0
font_weight = "bold"
text_align = "left"
margin_before_pt = 0.0
margin_after_pt = 6.0

[headings.h2]
font_size_pt = 9.5
font_weight = "bold"
margin_before_pt = 5.0
margin_after_pt = 1.5

[headings.h3]
font_size_pt = 8.5
font_weight = "bold"
margin_before_pt = 3.5
margin_after_pt = 1.0

[list.common]
margin_after_pt = 1.0
indent_per_level_pt = 7.0
item_spacing_tight_pt = 1.0
bullet_gap_pt = 2.5

[link]
text_color = "#0563C1"
underline = false
