theme = "dark_plus"

[editor]
scrolloff = 8
line-number = "relative"
cursorline = true
cursorcolumn = true
color-modes = true
rulers = [80]
bufferline = "multiple"
true-color = true
mouse = true
auto-format = true
idle-timeout = 50

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "│"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.search]
smart-case = true
wrap-around = true

[keys.normal]
# Vim-like motions
G = "goto_file_end"
0 = "goto_line_start"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"

# File search (Telescope equivalents)
C-f = "file_picker"
C-g = "global_search"
C-b = "buffer_picker"
C-d = "diagnostics_picker"

# Window navigation
# C-h = "jump_view_left"
# C-j = "jump_view_down"
# C-k = "jump_view_up"
# C-l = "jump_view_right"

# Diagnostic navigation
[keys.normal."]"]
d = "goto_next_diag"

[keys.normal."["]
d = "goto_prev_diag"

# Split management
[keys.normal.f]
s = { v = "vsplit", h = "hsplit" }

# LSP navigation
[keys.normal.g]
d = "goto_definition"
r = "goto_reference"
I = "goto_implementation"
y = "goto_type_definition"
D = "goto_declaration"
K = "signature_help"
g = "goto_file_start"

# Leader key bindings (comma)
[keys.normal.","]
f = "file_picker"
g = "global_search"
d = "workspace_diagnostics_picker"
h = "command_palette"
"?" = "file_picker_in_current_directory"
"/" = "search"
q = "diagnostics_picker"
x = ":buffer-close"
space = "buffer_picker"

[keys.normal.",".c]
a = "code_action"
r = "rename_symbol"
f = "format_selections"
s = "symbol_picker"
d = "hover"

[keys.normal.",".w]
s = "workspace_symbol_picker"

[keys.normal.",".r]
n = "rename_symbol"

[keys.select]
G = "goto_file_end"
0 = "goto_line_start"
"{" = "goto_prev_paragraph"
"}" = "goto_next_paragraph"
J = ["extend_line_down", "move_line_down"]
K = ["extend_line_up", "move_line_up"]

[keys.insert]
C-k = "signature_help"
